name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel an older run on the same branch when a new push lands —
# saves runner minutes and keeps the latest commit's status as the
# canonical answer.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # All unit tests now live under :composeApp — desktopTest covers
      # the parser / wire-format Tlon protocol regressions plus the
      # JSON-backed settings stores. Pure JVM, runs on ubuntu-latest.
      - name: Run unit tests
        run: ./gradlew :composeApp:desktopTest --stacktrace

      # Hook test runs the bash test harness that stages synthetic
      # content into throwaway git repos and asserts the pre-commit
      # rules (block / allow) match expectations. Catches both rule
      # regressions and exemption-path drift.
      - name: Run pre-commit hook tests
        run: ./scripts/hooks/test-pre-commit.sh

      # Upload JUnit XML reports on failure so the failing test names
      # are surfaced in the PR check view without having to dig into
      # raw build logs.
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            composeApp/build/reports/tests/
            composeApp/build/test-results/
          if-no-files-found: ignore
