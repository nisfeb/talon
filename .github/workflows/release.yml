name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Single source of truth for the tag-vs-versionName check, so the
  # downstream jobs don't each re-parse build.gradle.kts. Outputs the
  # parsed version_name / version_code for steps that need them.
  tagcheck:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.parse.outputs.version_name }}
      version_code: ${{ steps.parse.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4
      - id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION_CODE=$(grep 'versionCode = ' app/build.gradle.kts | head -1 | grep -oE '[0-9]+')
          VERSION_NAME=$(grep 'versionName = ' app/build.gradle.kts | head -1 | grep -oE '"[^"]+"' | tr -d '"')
          if [ "$TAG" != "$VERSION_NAME" ]; then
            echo "::error::Tag (v$TAG) does not match versionName ($VERSION_NAME) in build.gradle.kts"
            exit 1
          fi
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

  # Android APK build + sign. Conditional on the four signing secrets
  # being set on the repo. When they're absent (e.g. desktop-only
  # release flows, fresh forks), the job runs to completion but emits
  # no APK artifact and the release publishes desktop installers only.
  build-android:
    needs: tagcheck
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check keystore secret presence
        id: chk
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::RELEASE_KEYSTORE_BASE64 not set — skipping Android APK build"
            echo "have_keystore=false" >> $GITHUB_OUTPUT
          else
            echo "have_keystore=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        if: steps.chk.outputs.have_keystore == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        if: steps.chk.outputs.have_keystore == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          : "${STORE_PASSWORD:?RELEASE_STORE_PASSWORD secret is not set}"
          : "${KEY_ALIAS:?RELEASE_KEY_ALIAS secret is not set}"
          : "${KEY_PASSWORD:?RELEASE_KEY_PASSWORD secret is not set}"
          umask 077
          mkdir -p ~/.config/talon
          echo "$KEYSTORE_BASE64" | base64 -d > ~/.config/talon/release.keystore
          {
            echo "storeFile=$HOME/.config/talon/release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > ~/.config/talon/keystore.properties

      - name: Build release APK
        if: steps.chk.outputs.have_keystore == 'true'
        env:
          RELEASE_KEYSTORE_PROPS: /home/runner/.config/talon/keystore.properties
        run: ./gradlew :app:assembleRelease

      - name: Stage release artifacts
        if: steps.chk.outputs.have_keystore == 'true'
        id: stage
        env:
          VERSION_CODE: ${{ needs.tagcheck.outputs.version_code }}
          VERSION_NAME: ${{ needs.tagcheck.outputs.version_name }}
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          OUT_APK="talon-$VERSION_NAME.apk"
          cp "$APK" "$OUT_APK"
          SHA=$(sha256sum "$OUT_APK" | awk '{print $1}')
          CHANGELOG="$(git log -1 --pretty=%B | tr '\n' ' ' | sed 's/"/\\"/g')"
          sed -e "s|__VERSION_CODE__|$VERSION_CODE|" \
              -e "s|__VERSION_NAME__|$VERSION_NAME|g" \
              -e "s|__SHA256__|$SHA|" \
              -e "s|__CHANGELOG__|$CHANGELOG|" \
              -e "s|__MANDATORY__|false|" \
              release/manifest-template.json > latest.json
          echo "apk=$OUT_APK" >> $GITHUB_OUTPUT

      - name: Upload Android APK + manifest
        if: steps.chk.outputs.have_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            ${{ steps.stage.outputs.apk }}
            latest.json

  # Desktop matrix runs jpackage on each host OS so the per-platform
  # installer toolchains are present (dpkg + fakeroot on Linux,
  # hdiutil on macOS, WiX on Windows). Independent of build-android so
  # the desktop pipeline ships even without Android signing secrets.
  build-desktop:
    needs: tagcheck
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: packageReleaseDeb
            artifact_glob: composeApp/build/compose/binaries/main-release/deb/*.deb
            artifact_name: linux-deb
          - os: macos-latest
            target: packageReleaseDmg
            artifact_glob: composeApp/build/compose/binaries/main-release/dmg/*.dmg
            artifact_name: macos-dmg
          - os: windows-latest
            target: packageReleaseMsi
            artifact_glob: composeApp/build/compose/binaries/main-release/msi/*.msi
            artifact_name: windows-msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build native package (${{ matrix.target }})
        run: ./gradlew :composeApp:${{ matrix.target }}
        shell: bash
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      # AppImage piggybacks on the Linux deb job so we don't pay for a
      # second runner. The script invokes :createReleaseDistributable
      # itself — packageReleaseDeb produces the deb directly without
      # leaving the bundled-app dir behind, so we have to (re)build
      # the app-image. The second gradle invocation is mostly cache
      # hits since compileKotlinDesktop is up to date.
      # appimagetool itself is invoked with --appimage-extract-and-run
      # so this runner doesn't need FUSE.
      - name: Build AppImage (Linux only)
        if: runner.os == 'Linux'
        run: ./scripts/build-appimage.sh
      - name: Upload AppImage (Linux only)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/Talon-x86_64.AppImage
          if-no-files-found: error

  release:
    needs: [tagcheck, build-android, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          set -euo pipefail
          mkdir -p release-files
          # Use cp -n (no-clobber) so a future change that emits two
          # artifacts with the same basename (e.g. arm64 + amd64 .deb)
          # surfaces a collision rather than silently overwriting.
          collisions=0
          while IFS= read -r -d '' src; do
            dest="release-files/$(basename "$src")"
            if [ -e "$dest" ]; then
              echo "::error::Artifact name collision: $src would overwrite $dest"
              collisions=$((collisions + 1))
            else
              cp "$src" "$dest"
            fi
          done < <(find artifacts -type f \( \
            -name '*.apk' -o \
            -name '*.deb' -o \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.AppImage' -o \
            -name 'latest.json' \
          \) -print0)
          if [ "$collisions" -gt 0 ]; then
            echo "::error::$collisions artifact name collision(s) — refusing to publish"
            exit 1
          fi
          # Desktop matrix is configured to emit one .deb, one .dmg,
          # one .msi, and one .AppImage. Bail if any of those are
          # missing — they're not optional. APK + latest.json are
          # optional (only present when the keystore secret is set).
          required_count=$(find release-files -type f \
            \( -name '*.deb' -o -name '*.dmg' -o -name '*.msi' \
               -o -name '*.AppImage' \) | wc -l)
          if [ "$required_count" -lt 4 ]; then
            echo "::error::Expected ≥4 desktop installers (.deb, .dmg, .msi, .AppImage), got $required_count"
            ls -la release-files/
            exit 1
          fi
          ls -la release-files/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
