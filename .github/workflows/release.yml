name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Required for softprops/action-gh-release to publish the
      # release. Modern repos default GITHUB_TOKEN.contents to read,
      # which would 403 on any release-creation API call.
      contents: write
    outputs:
      version_name: ${{ steps.tagcheck.outputs.version_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches versionName
        id: tagcheck
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION_CODE=$(grep 'versionCode = ' app/build.gradle.kts | head -1 | grep -oE '[0-9]+')
          VERSION_NAME=$(grep 'versionName = ' app/build.gradle.kts | head -1 | grep -oE '"[^"]+"' | tr -d '"')
          if [ "$TAG" != "$VERSION_NAME" ]; then
            echo "::error::Tag (v$TAG) does not match versionName ($VERSION_NAME) in build.gradle.kts"
            exit 1
          fi
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          : "${KEYSTORE_BASE64:?RELEASE_KEYSTORE_BASE64 secret is not set}"
          : "${STORE_PASSWORD:?RELEASE_STORE_PASSWORD secret is not set}"
          : "${KEY_ALIAS:?RELEASE_KEY_ALIAS secret is not set}"
          : "${KEY_PASSWORD:?RELEASE_KEY_PASSWORD secret is not set}"
          umask 077
          mkdir -p ~/.config/talon
          echo "$KEYSTORE_BASE64" | base64 -d > ~/.config/talon/release.keystore
          {
            echo "storeFile=$HOME/.config/talon/release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > ~/.config/talon/keystore.properties

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PROPS: /home/runner/.config/talon/keystore.properties
        run: ./gradlew :app:assembleRelease

      - name: Stage release artifacts
        id: stage
        env:
          VERSION_CODE: ${{ steps.tagcheck.outputs.version_code }}
          VERSION_NAME: ${{ steps.tagcheck.outputs.version_name }}
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          OUT_APK="talon-$VERSION_NAME.apk"
          cp "$APK" "$OUT_APK"
          SHA=$(sha256sum "$OUT_APK" | awk '{print $1}')
          CHANGELOG="$(git log -1 --pretty=%B | tr '\n' ' ' | sed 's/"/\\"/g')"
          sed -e "s|__VERSION_CODE__|$VERSION_CODE|" \
              -e "s|__VERSION_NAME__|$VERSION_NAME|g" \
              -e "s|__SHA256__|$SHA|" \
              -e "s|__CHANGELOG__|$CHANGELOG|" \
              -e "s|__MANDATORY__|false|" \
              release/manifest-template.json > latest.json
          echo "apk=$OUT_APK" >> $GITHUB_OUTPUT

      - name: Upload Android APK + manifest
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            ${{ steps.stage.outputs.apk }}
            latest.json

  # Desktop matrix runs jpackage on each host OS so the per-platform
  # installer toolchains are present (dpkg + fakeroot on Linux,
  # hdiutil on macOS, WiX on Windows). Each job uploads its installer
  # as a workflow artifact; the `release` job below collects all four
  # and publishes them as a single GitHub Release.
  build-desktop:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: packageReleaseDeb
            artifact_glob: composeApp/build/compose/binaries/main-release/deb/*.deb
            artifact_name: linux-deb
          - os: macos-latest
            target: packageReleaseDmg
            artifact_glob: composeApp/build/compose/binaries/main-release/dmg/*.dmg
            artifact_name: macos-dmg
          - os: windows-latest
            target: packageReleaseMsi
            artifact_glob: composeApp/build/compose/binaries/main-release/msi/*.msi
            artifact_name: windows-msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build native package (${{ matrix.target }})
        run: ./gradlew :composeApp:${{ matrix.target }}
        shell: bash
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      # AppImage piggybacks on the Linux deb job so we don't pay for a
      # second runner. createReleaseDistributable is a transitive
      # dependency of packageReleaseDeb, so the bundled app dir already
      # exists by the time we get here. --skip-build avoids re-running
      # gradle. libfuse2 is for the AppImage's runtime on the testers'
      # machines; appimagetool itself is invoked with
      # --appimage-extract-and-run so this runner doesn't need FUSE.
      - name: Build AppImage (Linux only)
        if: runner.os == 'Linux'
        run: ./scripts/build-appimage.sh --skip-build
      - name: Upload AppImage (Linux only)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/Talon-x86_64.AppImage
          if-no-files-found: error

  release:
    needs: [build, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          set -euo pipefail
          mkdir -p release-files
          # Use cp -n (no-clobber) so a future change that emits two
          # artifacts with the same basename (e.g. arm64 + amd64 .deb)
          # surfaces a collision rather than silently overwriting.
          collisions=0
          while IFS= read -r -d '' src; do
            dest="release-files/$(basename "$src")"
            if [ -e "$dest" ]; then
              echo "::error::Artifact name collision: $src would overwrite $dest"
              collisions=$((collisions + 1))
            else
              cp "$src" "$dest"
            fi
          done < <(find artifacts -type f \( \
            -name '*.apk' -o \
            -name '*.deb' -o \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.AppImage' -o \
            -name 'latest.json' \
          \) -print0)
          if [ "$collisions" -gt 0 ]; then
            echo "::error::$collisions artifact name collision(s) — refusing to publish"
            exit 1
          fi
          # Sanity check: the matrix is configured to emit one .apk,
          # one .deb, one .dmg, one .msi, one .AppImage, and one
          # latest.json. Bail if we got fewer (e.g. an artifact-glob
          # mismatch silently produced nothing).
          count=$(find release-files -type f | wc -l)
          if [ "$count" -lt 6 ]; then
            echo "::error::Expected ≥6 release files, got $count"
            ls -la release-files/
            exit 1
          fi
          ls -la release-files/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
