name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Required for softprops/action-gh-release to publish the
      # release. Modern repos default GITHUB_TOKEN.contents to read,
      # which would 403 on any release-creation API call.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches versionName
        id: tagcheck
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION_CODE=$(grep 'versionCode = ' app/build.gradle.kts | head -1 | grep -oE '[0-9]+')
          VERSION_NAME=$(grep 'versionName = ' app/build.gradle.kts | head -1 | grep -oE '"[^"]+"' | tr -d '"')
          if [ "$TAG" != "$VERSION_NAME" ]; then
            echo "::error::Tag (v$TAG) does not match versionName ($VERSION_NAME) in build.gradle.kts"
            exit 1
          fi
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          : "${KEYSTORE_BASE64:?RELEASE_KEYSTORE_BASE64 secret is not set}"
          : "${STORE_PASSWORD:?RELEASE_STORE_PASSWORD secret is not set}"
          : "${KEY_ALIAS:?RELEASE_KEY_ALIAS secret is not set}"
          : "${KEY_PASSWORD:?RELEASE_KEY_PASSWORD secret is not set}"
          umask 077
          mkdir -p ~/.config/talon
          echo "$KEYSTORE_BASE64" | base64 -d > ~/.config/talon/release.keystore
          {
            echo "storeFile=$HOME/.config/talon/release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > ~/.config/talon/keystore.properties

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PROPS: /home/runner/.config/talon/keystore.properties
        run: ./gradlew :app:assembleRelease

      - name: Stage release artifacts
        id: stage
        env:
          VERSION_CODE: ${{ steps.tagcheck.outputs.version_code }}
          VERSION_NAME: ${{ steps.tagcheck.outputs.version_name }}
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          OUT_APK="talon-$VERSION_NAME.apk"
          cp "$APK" "$OUT_APK"
          SHA=$(sha256sum "$OUT_APK" | awk '{print $1}')
          CHANGELOG="$(git log -1 --pretty=%B | tr '\n' ' ' | sed 's/"/\\"/g')"
          sed -e "s|__VERSION_CODE__|$VERSION_CODE|" \
              -e "s|__VERSION_NAME__|$VERSION_NAME|g" \
              -e "s|__SHA256__|$SHA|" \
              -e "s|__CHANGELOG__|$CHANGELOG|" \
              -e "s|__MANDATORY__|false|" \
              release/manifest-template.json > latest.json
          echo "apk=$OUT_APK" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.stage.outputs.apk }}
            latest.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
